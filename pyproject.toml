[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "oxipy"
version = "0.1.0"
description = "Oxi API client"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "requests>=2.32.5",
]
[tool.setuptools.packages.find]
where = ["."]
include = ["oxi*"]